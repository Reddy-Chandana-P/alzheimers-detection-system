<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Model Performance Metrics</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .metric-card {
            background: rgba(0, 234, 255, 0.1);
            border: 1px solid rgba(0, 234, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .metric-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00eaff;
            margin: 10px 0;
        }
        .metric-label {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .confusion-matrix-container {
            text-align: center;
            margin: 20px 0;
        }
        .confusion-matrix-container img {
            max-width: 100%;
            border-radius: 10px;
            border: 2px solid rgba(0, 234, 255, 0.3);
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(0, 234, 255, 0.2);
            border: 1px solid #00eaff;
            border-radius: 20px;
            color: #00eaff;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(0, 234, 255, 0.4);
        }
        .error-msg {
            text-align: center;
            color: #ff4444;
            padding: 40px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Model Performance Metrics</h1>
            <p>EfficientNetB0 + MobileNetV2 — Alzheimer's Detection</p>
            <a href="/" class="back-btn">← Back to Detection</a>
        </header>

        <div id="metricsContent">
            <p style="text-align:center; color: #00eaff;">Loading metrics...</p>
        </div>
    </div>

    <script>
        async function loadMetrics() {
            const container = document.getElementById('metricsContent');
            try {
                const response = await fetch('/metrics');
                if (!response.ok) throw new Error('Metrics not available');
                const data = await response.json();

                container.innerHTML = `
                    <div class="card">
                        <h2>Overall Performance</h2>
                        <div class="metrics-grid">
                            <div class="metric-card">
                                <div class="metric-label">Accuracy</div>
                                <div class="metric-value">${data.accuracy}</div>
                                <div style="font-size:0.85rem; color: rgba(255,255,255,0.6);">Correctly classified samples</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label">Precision</div>
                                <div class="metric-value">${data.precision}</div>
                                <div style="font-size:0.85rem; color: rgba(255,255,255,0.6);">True positives / predicted positives</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label">Recall</div>
                                <div class="metric-value">${data.recall}</div>
                                <div style="font-size:0.85rem; color: rgba(255,255,255,0.6);">True positives / actual positives</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label">F1 Score</div>
                                <div class="metric-value">${data.f1_score}</div>
                                <div style="font-size:0.85rem; color: rgba(255,255,255,0.6);">Harmonic mean of precision & recall</div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h2>Confusion Matrix</h2>
                        <p style="color: rgba(255,255,255,0.7); margin-bottom: 15px;">
                            Shows how the model classified each Alzheimer's stage. Diagonal values represent correct predictions.
                        </p>
                        <div class="confusion-matrix-container">
                            <img src="${data.confusion_matrix}" alt="Confusion Matrix">
                        </div>
                    </div>

                    <div class="card">
                        <h2>Model Details</h2>
                        <div class="metrics-grid">
                            <div class="metric-card">
                                <div class="metric-label">Architecture</div>
                                <div style="font-size:1.2rem; font-weight:bold; color:#00eaff; margin:10px 0;">EfficientNetB0 + MobileNetV2</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label">Input Size</div>
                                <div class="metric-value">128×128</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label">Classes</div>
                                <div class="metric-value">4</div>
                                <div style="font-size:0.8rem; color: rgba(255,255,255,0.6);">No / Very Mild / Mild / Moderate</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label">Training Samples</div>
                                <div class="metric-value">6,400</div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (e) {
                container.innerHTML = `
                    <div class="error-msg">
                        <p>⚠️ Could not load metrics.</p>
                        <p style="font-size:0.9rem; margin-top:10px;">Make sure the server is running at <strong>http://localhost:5001</strong></p>
                    </div>
                `;
            }
        }

        loadMetrics();
    </script>
</body>
</html>
